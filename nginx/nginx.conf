server {
    listen 80;
    server_name localhost;
    client_max_body_size 50M;

    # Роутинг запитів до бекенду
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Роутинг запитів до медіафайлів (якщо бекенд їх роздає)
    location /media {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Роутинг до фронтенду (Vite) + підтримка WebSockets для Hot Reload
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Налаштування для роботи WebSocket (щоб фронтенд оновлювався на льоту)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}